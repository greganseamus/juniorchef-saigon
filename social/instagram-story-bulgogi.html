<!doctype html>
<!-- JuniorChef Saigon · Instagram Story · Korean Beef Bulgogi Skewers
     1080×1920px (9:16).
     Suggested caption: "New recipe drop! 🔥 Korean Beef Bulgogi Skewers — free to download. Link below."
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080">
<title>Bulgogi Story · JuniorChef</title>
<link rel="stylesheet" href="../project/colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body { background: var(--ink); position: relative; font-family: var(--font-display); }

  .photo { position: absolute; inset: 0; }
  .photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.45; }
  .photo::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(31,26,20,0.2) 0%, rgba(31,26,20,0.9) 55%, rgba(31,26,20,0.98) 100%);
  }

  .content {
    position: absolute; inset: 0;
    padding: 80px 80px 100px;
    display: flex; flex-direction: column; justify-content: space-between;
    z-index: 2;
  }

  .logo img { height: 80px; filter: brightness(0) invert(1); opacity: 0.85; }

  .middle {
    display: flex; flex-direction: column; gap: 32px;
  }

  .eyebrow {
    font-family: var(--font-body); font-weight: 800;
    font-size: 28px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--jc-orange);
    display: flex; align-items: center; gap: 20px;
  }
  .eyebrow::before {
    content: ''; display: block;
    width: 64px; height: 5px; background: var(--jc-orange); border-radius: 2px;
  }

  .dish-title {
    font-size: 148px; line-height: 0.88;
    text-transform: uppercase; letter-spacing: -0.02em; color: #fff;
  }
  .dish-title .or { color: var(--jc-orange); }
  .dish-title .yl { color: var(--jc-yellow); }

  .tagline {
    font-family: var(--font-hand); font-weight: 700;
    font-size: 68px; line-height: 1.15;
    color: rgba(255,255,255,0.65);
  }

  .fact {
    font-family: var(--font-body); font-weight: 600;
    font-size: 28px; color: rgba(255,255,255,0.45);
    letter-spacing: 0.06em;
  }

  .cta-block { display: flex; flex-direction: column; gap: 20px; }
  .link-marker {
    font-family: var(--font-body); font-weight: 800;
    font-size: 28px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); border: 3px dashed rgba(255,255,255,0.3);
    border-radius: 20px; padding: 24px 32px; text-align: center;
  }
  .cta-btn {
    background: var(--jc-orange); color: #fff;
    font-family: var(--font-body); font-weight: 800;
    font-size: 36px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 28px 48px; border-radius: 999px;
    border: 4px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 0 rgba(0,0,0,0.5);
    text-align: center;
  }
  .ages-row { display: flex; align-items: center; gap: 20px; }
  .ages {
    font-family: var(--font-body); font-weight: 800;
    font-size: 28px; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--jc-yellow); color: var(--ink);
    padding: 12px 28px; border-radius: 999px;
    border: 3px solid rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
<div class="photo">
  <img src="../project/assets/photos/korean-beef-bulgogi-skewers.png" alt="Korean Beef Bulgogi Skewers">
</div>
<div class="content">
  <div class="logo"><img src="../project/assets/logo/juniorchef-logo.png" alt="JuniorChef Saigon"></div>
  <div class="middle">
    <div class="eyebrow">Recipe Drop · Korean</div>
    <h1 class="dish-title">
      <span class="or">Bul</span><span class="yl">go</span><br>
      -gi<br>
      Skewers
    </h1>
    <div class="tagline">Fire meat,<br>made by kids.</div>
    <div class="fact">Free recipe sheet + worksheet</div>
  </div>
  <div class="cta-block">
    <div class="link-marker">👆 Link sticker here</div>
    <div class="cta-btn">Download Free</div>
    <div class="ages-row">
      <div class="ages">Ages 6–12</div>
      <div style="font-family:var(--font-body);font-size:26px;color:rgba(255,255,255,0.4)">Print at home</div>
    </div>
  </div>
</div>
</body>
</html>
