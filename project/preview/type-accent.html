<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Accent type — Caveat & mono</title>
<style>
  .hand { font-family: var(--font-hand); font-weight: 700; font-size: 32px; line-height: 1.2; color: #D82828; }
  .mono { font-family: var(--font-mono); font-size: 14px; color: var(--ink); background: #FBF3E2; padding: 6px 10px; border-radius: 6px; display: inline-block; }
  .eyebrow { font-family: var(--font-body); font-weight: 800; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: #D82828; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .stack > div + div { margin-top: 14px; }
</style></head><body>
<div class="stack">
  <div>
    <div class="eyebrow">Recipe · For 4</div>
    <div class="tag">Eyebrow · Nunito 800 · 13px · tracking 14% · uppercase</div>
  </div>
  <div>
    <div class="hand">"trust your tastebuds!"</div>
    <div class="tag">Hand · Caveat 700 · tip boxes, chef's notes — use sparingly</div>
  </div>
  <div>
    <span class="mono">200g flour</span>
    <span class="mono">12–15 min</span>
    <span class="mono">200°C</span>
    <div class="tag" style="margin-top:6px">Mono · ui-monospace · measurements + timings</div>
  </div>
</div>
</body></html>
