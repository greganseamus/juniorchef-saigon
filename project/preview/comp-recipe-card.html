<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Recipe card</title>
<style>
  .rc { background: #FFFDF7; border: 2.5px solid #1F1A14; border-radius: 22px; overflow: hidden; display: grid; grid-template-columns: 150px 1fr; box-shadow: 0 6px 0 #1F1A14; }
  .rc img { width: 100%; height: 100%; object-fit: cover; }
  .body { padding: 14px 18px; display: flex; flex-direction: column; gap: 6px; }
  .eyebrow { font-family: var(--font-body); font-weight: 800; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #D82828; }
  .title { font-family: var(--font-display); font-weight: 600; font-size: 26px; line-height: 1.05; text-transform: uppercase; color: #1F1A14; }
  .meta { font-family: var(--font-body); font-size: 13px; color: #4A4238; display: flex; gap: 10px; margin-top: auto; }
  .meta b { color: #1F1A14; }
</style></head><body>
<div class="rc">
  <img src="../assets/photos/korean-beef-bulgogi-skewers.png" alt="">
  <div class="body">
    <div class="eyebrow">Recipe · Korea</div>
    <div class="title">Bulgogi Skewers</div>
    <div class="meta"><span><b>For 4</b></span><span>·</span><span>~30 min</span><span>·</span><span>Stove</span></div>
  </div>
</div>
</body></html>
