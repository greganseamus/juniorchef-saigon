<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Body type — Nunito</title>
<style>
  .b { font-family: var(--font-body); color: var(--ink); }
  .lead { font-weight: 600; font-size: 22px; line-height: 1.45; color: var(--ink-soft); }
  .p { font-weight: 400; font-size: 16px; line-height: 1.45; }
  .small { font-weight: 400; font-size: 14px; color: var(--ink-soft); }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .stack > div + div { margin-top: 12px; }
</style></head><body>
<div class="stack b">
  <div>
    <div class="lead">Cold ingredients are the secret to flaky shortcake.</div>
    <div class="tag">Lead · Nunito 600 · 22px / 1.45</div>
  </div>
  <div>
    <div class="p">Mix the flour, butter, and yogurt in the freezer for 10 minutes. Preheat the oven to 200°C.</div>
    <div class="tag">Body · Nunito 400 · 16px / 1.45</div>
  </div>
  <div>
    <div class="small">Tip: the longer the berries sit, the juicier they get.</div>
    <div class="tag">Small · Nunito 400 · 14px</div>
  </div>
</div>
</body></html>
