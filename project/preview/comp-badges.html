<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Badges & chips</title>
<style>
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 999px; font-family: var(--font-body); font-weight: 800; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .r { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 999px; }
</style></head><body>
<div class="r">
  <span class="pill" style="background:#F4C8C8;color:#9E1A1A"><span class="dot" style="background:#D82828"></span>For 4</span>
  <span class="pill" style="background:#C0E4DE;color:#1B6E62"><span class="dot" style="background:#28A090"></span>Vegetarian</span>
  <span class="pill" style="background:#FDD9B3;color:#B35C00"><span class="dot" style="background:#F88000"></span>Medium heat</span>
  <span class="pill" style="background:#FDEDC6;color:#B5872F"><span class="dot" style="background:#F8C048"></span>45 min</span>
</div>
<div class="r">
  <span class="pill" style="background:#1F1A14;color:#FFFDF7">Ages 6–8</span>
  <span class="pill" style="background:#1F1A14;color:#FFFDF7">Ages 9–12</span>
  <span class="pill" style="background:#FFFDF7;color:#1F1A14;border:2px solid #1F1A14">Knife skill</span>
  <span class="pill" style="background:#FFFDF7;color:#1F1A14;border:2px solid #1F1A14">Stove skill</span>
</div>
<div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);margin-top:6px">Use tinted fills for status; solid ink for category; outlined for optional filters.</div>
</body></html>
