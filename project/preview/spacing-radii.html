<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Radii</title>
<style>
  .row-r { display: grid; grid-template-columns: repeat(4, 1fr) 1.6fr; gap: 12px; align-items: stretch; }
  .r { background: #FBF3E2; border: 2.5px solid #1F1A14; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .pill-cell { display: flex; flex-direction: column; justify-content: center; gap: 8px; padding: 10px 14px; background: #FBF3E2; border: 2.5px solid #1F1A14; border-radius: 999px; aspect-ratio: auto; align-items: flex-start; }
  .name { font-family: var(--font-body); font-weight: 800; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
</style></head><body>
<div class="row-r">
  <div class="r" style="border-radius:8px"><div class="name">sm</div><div class="val">8px</div></div>
  <div class="r" style="border-radius:14px"><div class="name">md</div><div class="val">14px</div></div>
  <div class="r" style="border-radius:22px"><div class="name">lg</div><div class="val">22px</div></div>
  <div class="r" style="border-radius:32px"><div class="name">xl</div><div class="val">32px</div></div>
  <div class="pill-cell"><div class="name">pill</div><div class="val">999px</div></div>
</div>
<div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);margin-top:12px">Generous + rounded · no sharp corners anywhere</div>
</body></html>
