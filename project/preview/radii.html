<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Radii</title>
<style>
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .r { background: #FBF3E2; border: 2.5px solid #1F1A14; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .r .n { font-family: var(--font-display); font-weight: 600; font-size: 15px; }
  .r .v { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
</style></head><body>
<div class="grid-5">
  <div class="r" style="border-radius:8px"><div class="n">sm</div><div class="v">8px</div></div>
  <div class="r" style="border-radius:14px"><div class="n">md</div><div class="v">14px</div></div>
  <div class="r" style="border-radius:22px"><div class="n">lg</div><div class="v">22px</div></div>
  <div class="r" style="border-radius:32px"><div class="n">xl</div><div class="v">32px</div></div>
  <div class="r" style="border-radius:999px"><div class="n">pill</div><div class="v">999px</div></div>
</div>
</body></html>
