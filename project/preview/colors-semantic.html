<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Semantic colors</title>
<style>
  .row2 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .pill { border-radius: 999px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; font-family: var(--font-body); font-weight: 800; font-size: 14px; }
  .dot { width: 12px; height: 12px; border-radius: 999px; }
  .mapping { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
</style></head><body>
<div class="card-stack">
  <div class="row2">
    <div class="pill" style="background:#C0E4DE;color:#1B6E62"><span class="dot" style="background:#28A090"></span>Success</div>
    <div class="pill" style="background:#FDD9B3;color:#B35C00"><span class="dot" style="background:#F88000"></span>Warning</div>
    <div class="pill" style="background:#F4C8C8;color:#9E1A1A"><span class="dot" style="background:#D82828"></span>Danger</div>
    <div class="pill" style="background:#C0E4DE;color:#1B6E62"><span class="dot" style="background:#28A090"></span>Info</div>
  </div>
  <div class="mapping">
    --success → --jc-teal · --warning → --jc-orange · --danger → --jc-red · --info → --jc-teal. No blue / purple states by design — the palette is warm by rule.
  </div>
</div>
</body></html>
