<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing</title>
<style>
  .row-s { display: flex; align-items: flex-end; gap: 14px; }
  .bar { background: #28A090; border-radius: 6px; }
  .stack-s { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
  .name { font-family: var(--font-body); font-weight: 800; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
</style></head><body>
<div class="row-s">
  <div class="stack-s"><div class="bar" style="width:4px;height:4px"></div><div class="name">1</div><div class="lab">4</div></div>
  <div class="stack-s"><div class="bar" style="width:8px;height:8px"></div><div class="name">2</div><div class="lab">8</div></div>
  <div class="stack-s"><div class="bar" style="width:12px;height:12px"></div><div class="name">3</div><div class="lab">12</div></div>
  <div class="stack-s"><div class="bar" style="width:16px;height:16px"></div><div class="name">4</div><div class="lab">16</div></div>
  <div class="stack-s"><div class="bar" style="width:24px;height:24px"></div><div class="name">6</div><div class="lab">24</div></div>
  <div class="stack-s"><div class="bar" style="width:32px;height:32px"></div><div class="name">8</div><div class="lab">32</div></div>
  <div class="stack-s"><div class="bar" style="width:48px;height:48px"></div><div class="name">12</div><div class="lab">48</div></div>
  <div class="stack-s"><div class="bar" style="width:64px;height:64px"></div><div class="name">16</div><div class="lab">64</div></div>
  <div class="stack-s"><div class="bar" style="width:96px;height:96px"></div><div class="name">24</div><div class="lab">96</div></div>
</div>
<div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);margin-top:12px">4px base grid · --space-1 through --space-24</div>
</body></html>
