<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Display type — Fredoka</title>
<style>
  .spec { font-family: var(--font-display); color: var(--ink); line-height: 1.0; letter-spacing: -0.01em; text-transform: uppercase; }
  .big { font-size: 88px; font-weight: 700; }
  .mid { font-size: 48px; font-weight: 600; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
  .row-x { display: grid; grid-template-columns: 1fr; gap: 14px; }
</style></head><body>
<div class="row-x">
  <div>
    <div class="spec big" style="color:#D82828">Bulgogi!</div>
    <div class="tag">Display · Fredoka 700 · 88px / lh 1.0 · tracking −1%</div>
  </div>
  <div>
    <div class="spec mid"><span style="color:#D82828">Junior</span><span style="color:#28A090">Chef</span></div>
    <div class="tag">H1 · Fredoka 600 · 48px · dish titles + section headers</div>
  </div>
</div>
</body></html>
