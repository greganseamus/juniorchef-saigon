<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Tints & shades</title>
<style>
  .group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .chip { border-radius: 10px; padding: 12px 14px; font-family: var(--font-mono); font-size: 11px; display: flex; justify-content: space-between; align-items: center; height: 46px; }
  .label { font-family: var(--font-body); font-weight: 800; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .stack { display: grid; gap: 6px; }
  .stack .head { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--ink); }
</style></head><body>
<div class="grid-4" style="gap:12px">
  <div class="stack">
    <div class="head">Red</div>
    <div class="chip" style="background:#F4C8C8;color:#9E1A1A"><span class="label">Tint</span><span>#F4C8C8</span></div>
    <div class="chip" style="background:#D82828;color:#fff"><span class="label">Base</span><span>#D82828</span></div>
    <div class="chip" style="background:#9E1A1A;color:#fff"><span class="label">Deep</span><span>#9E1A1A</span></div>
  </div>
  <div class="stack">
    <div class="head">Teal</div>
    <div class="chip" style="background:#C0E4DE;color:#1B6E62"><span class="label">Tint</span><span>#C0E4DE</span></div>
    <div class="chip" style="background:#28A090;color:#fff"><span class="label">Base</span><span>#28A090</span></div>
    <div class="chip" style="background:#1B6E62;color:#fff"><span class="label">Deep</span><span>#1B6E62</span></div>
  </div>
  <div class="stack">
    <div class="head">Orange</div>
    <div class="chip" style="background:#FDD9B3;color:#B35C00"><span class="label">Tint</span><span>#FDD9B3</span></div>
    <div class="chip" style="background:#F88000;color:#fff"><span class="label">Base</span><span>#F88000</span></div>
    <div class="chip" style="background:#B35C00;color:#fff"><span class="label">Deep</span><span>#B35C00</span></div>
  </div>
  <div class="stack">
    <div class="head">Yellow</div>
    <div class="chip" style="background:#FDEDC6;color:#B5872F"><span class="label">Tint</span><span>#FDEDC6</span></div>
    <div class="chip" style="background:#F8C048;color:#1F1A14"><span class="label">Base</span><span>#F8C048</span></div>
    <div class="chip" style="background:#B5872F;color:#fff"><span class="label">Deep</span><span>#B5872F</span></div>
  </div>
</div>
</body></html>
