<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Step number</title>
<style>
  .step { display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start; margin-bottom: 14px; }
  .num { width: 56px; height: 56px; border-radius: 999px; background: #D82828; color: #fff; border: 2.5px solid #1F1A14; font-family: var(--font-display); font-weight: 700; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #1F1A14; flex-shrink: 0; }
  .t { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: #1F1A14; line-height: 1.1; text-transform: uppercase; letter-spacing: -0.01em; }
  .d { font-family: var(--font-body); font-size: 15px; color: #1F1A14; line-height: 1.45; margin-top: 4px; }
  .alt .num { background: #28A090; }
</style></head><body>
<div class="step">
  <div class="num">1</div>
  <div><div class="t">Chill Everything First</div><div class="d">Put the flour, butter, and yogurt in the freezer for 10 minutes.</div></div>
</div>
<div class="step alt">
  <div class="num">2</div>
  <div><div class="t">Prep the Berries</div><div class="d">Slice the strawberries and mix with the raspberries and blueberries.</div></div>
</div>
</body></html>
