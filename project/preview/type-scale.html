<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Type scale</title>
<style>
  table { border-collapse: collapse; width: 100%; }
  td { padding: 6px 10px; vertical-align: baseline; }
  td.t { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); white-space: nowrap; width: 1%; letter-spacing: 0.06em; text-transform: uppercase; }
  td.s { font-family: var(--font-display); color: var(--ink); font-weight: 600; line-height: 1; }
</style></head><body>
<table>
  <tr><td class="t">88 / display</td><td class="s" style="font-size:52px">Aa</td></tr>
  <tr><td class="t">48 / h1</td><td class="s" style="font-size:40px">Aa</td></tr>
  <tr><td class="t">36 / h2</td><td class="s" style="font-size:30px">Aa</td></tr>
  <tr><td class="t">28 / h3</td><td class="s" style="font-size:24px">Aa</td></tr>
  <tr><td class="t">22 / lead</td><td class="s" style="font-size:20px;font-family:var(--font-body);font-weight:600">Aa</td></tr>
  <tr><td class="t">16 / body</td><td class="s" style="font-size:16px;font-family:var(--font-body);font-weight:400">Aa</td></tr>
  <tr><td class="t">14 / small</td><td class="s" style="font-size:14px;font-family:var(--font-body);font-weight:400">Aa</td></tr>
</table>
</body></html>
