<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Logo</title>
<style>
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: center; }
  .box { background: #FFFDF7; border: 1px solid #E5DDCB; border-radius: 14px; padding: 18px; display: flex; align-items: center; justify-content: center; height: 180px; }
  .box.dark { background: #1F1A14; }
  .box img { max-width: 80%; max-height: 140px; }
  .note { grid-column: 1/-1; font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); }
</style></head><body>
<div class="wrap">
  <div class="box"><img src="../assets/logo/juniorchef-logo.png" alt="JuniorChef Saigon logo"></div>
  <div class="box dark"><img src="../assets/logo/juniorchef-logo.png" alt="" style="filter:brightness(1.1)"></div>
  <div class="note">Master wordmark · raster asset · do not recreate in CSS · min width 80px to stay legible</div>
</div>
</body></html>
