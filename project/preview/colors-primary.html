<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Primary palette</title>
<style>
  .swatch { border-radius: 14px; padding: 16px 18px; display: flex; flex-direction: column; justify-content: space-between; aspect-ratio: 1.1; color: var(--paper); }
  .swatch .name { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: -0.01em; }
  .swatch .hex { font-family: var(--font-mono); font-size: 13px; opacity: 0.9; }
  .swatch .role { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.85; }
</style></head><body>
<div class="grid-4">
  <div class="swatch" style="background:#D82828"><div class="role">Primary</div><div><div class="name">Red</div><div class="hex">#D82828</div></div></div>
  <div class="swatch" style="background:#28A090"><div class="role">Primary</div><div><div class="name">Teal</div><div class="hex">#28A090</div></div></div>
  <div class="swatch" style="background:#F88000"><div class="role">Secondary</div><div><div class="name">Orange</div><div class="hex">#F88000</div></div></div>
  <div class="swatch" style="background:#F8C048;color:#1F1A14"><div class="role">Secondary</div><div><div class="name">Yellow</div><div class="hex">#F8C048</div></div></div>
</div>
</body></html>
